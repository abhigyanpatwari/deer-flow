# GitNexus Claude Code workflow.
#
# Installed by the Hub's "Enable CI" flow when the user opts in to
# @claude commands. The Hub does simple ${PLACEHOLDER} substitution on
# this file before pushing it to the user's repo:
#
#   https://gitnexus-enterprise-staging.up.railway.app/mcp                 — full URL of the user's GitNexus Hub
#                                    MCP endpoint, e.g.
#                                    https://hub.gitnexus.io/mcp
#   GITNEXUS_TOKEN   — name of the GitHub Actions secret
#                                    holding the GitNexus API token (default
#                                    GITNEXUS_TOKEN). The user creates the
#                                    secret themselves.
#
# The user must additionally provide:
#   - secrets.CLAUDE_CODE_OAUTH_TOKEN — their Claude Code subscription token
#   - secrets.GITNEXUS_TOKEN — a GitNexus API token
#
# Without those secrets the workflow runs but Claude can't authenticate.
#
# Cloned from gitnexusv2's battle-tested setup. The author-association
# gates and fork-safe SHA pinning are preserved verbatim.

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

# Serialize per-PR/issue to avoid racing comments.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.event.issue.id }}
  cancel-in-progress: false

jobs:
  claude:
    if: |
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR')
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR')
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        (github.event.review.author_association == 'OWNER' ||
         github.event.review.author_association == 'MEMBER' ||
         github.event.review.author_association == 'COLLABORATOR')
      ) ||
      (
        github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        (github.event.issue.author_association == 'OWNER' ||
         github.event.issue.author_association == 'MEMBER' ||
         github.event.issue.author_association == 'COLLABORATOR')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read # required for Claude to read CI results on PRs
    steps:
      # For PR-related triggers, resolve the fork repo so we can checkout correctly.
      - name: Resolve PR context
        id: pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v7
        with:
          script: |
            let prNumber = null;
            if (context.eventName === 'issue_comment' && context.payload.issue.pull_request) {
              prNumber = context.payload.issue.number;
            } else if (context.eventName === 'pull_request_review_comment') {
              prNumber = context.payload.pull_request.number;
            } else if (context.eventName === 'pull_request_review') {
              prNumber = context.payload.pull_request.number;
            }

            if (!prNumber) {
              core.setOutput('is_pr', 'false');
              return;
            }

            const resp = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const pr = resp.data;

            core.setOutput('is_pr', 'true');
            core.setOutput('number', String(prNumber));
            core.setOutput('sha', pr.head.sha);
            core.setOutput('repo', pr.head.repo.full_name);
            core.setOutput('branch', pr.head.ref);

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.pr.outputs.is_pr == 'true' && steps.pr.outputs.repo || github.repository }}
          ref: ${{ steps.pr.outputs.is_pr == 'true' && steps.pr.outputs.sha || '' }}
          fetch-depth: 1

      # Write the GitNexus MCP config to disk so we can pass it to Claude Code
      # via --mcp-config. claude-code-action does not have a top-level
      # mcp_config input — the supported path is `claude_args` with one or
      # more --mcp-config flags. See:
      # https://github.com/anthropics/claude-code-action/blob/main/docs/configuration.md
      - name: Write GitNexus MCP config
        run: |
          mkdir -p .claude
          cat > .claude/gitnexus-mcp.json <<'EOF'
          {
            "mcpServers": {
              "gitnexus": {
                "type": "http",
                "url": "https://gitnexus-enterprise-staging.up.railway.app/mcp",
                "headers": {
                  "Authorization": "Bearer ${{ secrets.GITNEXUS_TOKEN }}"
                }
              }
            }
          }
          EOF

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@9469d113c6afd29550c402740f22d1a97dd1209b # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_non_write_users: '*'
          show_full_output: true
          claude_args: --mcp-config .claude/gitnexus-mcp.json

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read
